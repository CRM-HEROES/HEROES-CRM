version: '3'
services:
  #PHP Service
  heroescrm:
    build:
      context: .
      dockerfile: Dockerfile
    image: heroescrm:latest
    container_name: heroescrm
    restart: always
    tty: true
    environment:
      SERVICE_NAME: app
      SERVICE_TAGS: production
      PHP_MEMORY_LIMIT: 128M
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ./storage/:/var/www/storage/
      - ./storage/logs/:/var/www/storage/logs/
      - ./ImageMagick-6/policy.xml:/etc/ImageMagick-6/policy.xml
    ports:
      - "127.0.0.1:9001:9000"
    command: php-fpm
    networks:
      - heroes-network

  # Redis Service
  redis:
    image: "redis:alpine"
    container_name: redis-heroes
    restart: unless-stopped
    networks:
      - heroes-network
    volumes:
      - ./redis:/var/lib/redis/data
    env_file:
      - .env
      
  # MySQL Service
  mysql:
    image: mysql:8.0
    container_name: mysql-heroes
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: heroes
    volumes:
      - ./mysql:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - heroes-network

  # Adminer service
  adminer:
    image: adminer:latest
    container_name: adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - mysql
    networks:
      - heroes-network

  #Nginx Service
  webserver:
    image: nginx:latest
    container_name: nginx
    restart: always
    tty: true
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./:/var/www:ro
      - ./nginx/conf.d/app.conf:/etc/nginx/conf.d/app.conf
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./certbot/www/:/var/www/certbot/
      - ./certbot/conf/:/etc/letsencrypt/
    links:
      - heroescrm
    command: "/bin/sh -c 'while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g \"daemon off;\"'"
    networks:
      - heroes-network

  #Certbot Service
  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - ./certbot/www/:/var/www/certbot/
      - ./certbot/conf/:/etc/letsencrypt/
      - ./var_log_letsencrypt:/var/log/letsencrypt
   #entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --dry-run; sleep 12h & wait $${!}; done;'"
    command: certonly --webroot -w /var/www/certbot --force-renewal --email devops@diris.fr -d heroescrm.io --agree-tos  
    networks:
      - heroes-network

  #Supervisor service
  supervisor:
    image: heroescrm:latest
    container_name: supervisor
    restart: always
    tty: true
    environment:
      SERVICE_NAME: app
      SERVICE_TAGS: production
      PHP_MEMORY_LIMIT: 128M
      working_dir: /var/www
    volumes:
       - ./:/var/www
       - ./storage/:/var/www/storage/
       - ./storage/logs/:/var/www/storage/logs/
       - ./supervisor/worker.conf:/etc/supervisor/conf.d/worker.conf
    depends_on:
      - heroescrm
      - webserver
    command: supervisord --nodaemon --configuration /etc/supervisor/conf.d/worker.conf
    networks:
      - heroes-network

#Docker Networks
networks:
  heroes-network:
    driver: bridge
